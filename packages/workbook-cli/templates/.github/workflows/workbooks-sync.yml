# Sync a workbook group between this repo and the broker.
#
# Place at .github/workflows/workbooks-sync.yml in the repo created
# by `workbook group clone --git`.
#
# Triggers:
#   - push to main      → applies on-disk state to the broker (push)
#   - 15 min schedule   → pulls broker state into the repo (pull)
#   - manual dispatch   → either direction
#
# Required secrets:
#   WORKBOOKS_BEARER    a CLI OAuth bearer token (generated by
#                       `workbook auth print-token` once we wire that;
#                       until then, copy from ~/.workbooks/auth.json)
#
# Tracker: this is the CLI-driven path to GitHub sync. The fuller
# broker-managed integration with installation tokens + webhooks lives
# in wb-97c.

name: workbooks-sync
on:
  push:
    branches: [main]
    paths:
      - ".workbooks-group.json"
      - "**/*.html"
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      direction:
        description: "push (repo → broker) or pull (broker → repo)"
        required: true
        default: push
        type: choice
        options: [push, pull]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install -g @work.books/cli

      - name: Authenticate
        run: |
          mkdir -p ~/.workbooks
          echo "${{ secrets.WORKBOOKS_BEARER }}" > ~/.workbooks/auth.json

      - name: Sync (push)
        if: github.event_name == 'push' || inputs.direction == 'push'
        run: workbook group push .

      - name: Sync (pull)
        if: github.event_name == 'schedule' || inputs.direction == 'pull'
        run: |
          workbook group pull .
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name  "workbooks-sync"
            git config user.email "sync@workbooks.sh"
            git add -A
            git commit -m "workbooks: pull from broker"
            git push
          fi
